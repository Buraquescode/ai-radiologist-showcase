<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Radiologist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            overflow-x: hidden;
        }
        .brand-gradient {
            background: radial-gradient(circle at top left, #f97316 0%, #7c2d12 100%);
        }
        input:focus {
            outline: none;
            border-color: #f97316 !important;
            box-shadow: 0 0 0 1px #f97316;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-0">

    <div class="flex flex-col md:flex-row w-full max-w-5xl md:h-[580px] bg-gray-900 shadow-2xl overflow-hidden rounded-2xl border border-gray-800">
        
        <div class="brand-gradient w-full md:w-5/12 p-8 md:p-12 flex flex-col justify-between text-white relative">
            <div class="relative z-10">
                <i class="fas fa-microscope text-3xl mb-4"></i>
                <h1 class="text-xl font-bold tracking-tight">AI Radiologist</h1>
            </div>

            <div class="relative z-10">
                <p class="text-orange-200 text-xs font-medium uppercase tracking-widest mb-1">Clarity Awaits</p>
                <h2 class="text-3xl md:text-4xl font-extrabold leading-tight">
                    Welcome back to your <span class="text-orange-300">workspace</span>.
                </h2>
            </div>
            <div class="absolute -bottom-10 -right-10 w-48 h-48 bg-white/5 rounded-full blur-3xl"></div>
        </div>

        <div class="w-full md:w-7/12 bg-gray-900 p-8 md:p-12 flex flex-col justify-center">
            
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-white mb-1">Welcome Back</h3>
                <p class="text-gray-400 text-xs font-medium">Log in to access your clinical dashboard.</p>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-wider">Email Address</label>
                    <input type="email" name="email" placeholder="dr.buraque@example.com" required 
                           class="w-full px-4 py-2.5 bg-gray-800/50 text-white border border-gray-700 rounded-lg text-sm focus:bg-gray-800 transition">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-[10px] text-orange-500 font-bold hover:text-orange-400 transition">Forgot?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="loginPassword" name="password" placeholder="••••••••" required 
                               class="w-full px-4 py-2.5 bg-gray-800/50 text-white border border-gray-700 rounded-lg text-sm focus:bg-gray-800 transition pr-10">
                        
                        <button type="button" onclick="toggleLoginPassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-orange-500 transition">
                            <i id="eyeIcon" class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full py-3 mt-4 text-sm font-bold text-white rounded-lg bg-orange-600 hover:bg-orange-500 shadow-md shadow-orange-900/20 transition-all active:scale-[0.98]">
                    Log In
                </button>
            </form>

            <div class="mt-6">
                <div class="flex items-center mb-6">
                    <div class="flex-grow border-t border-gray-800"></div>
                    <span class="px-3 text-[9px] text-gray-500 uppercase font-bold tracking-widest">or continue with</span>
                    <div class="flex-grow border-t border-gray-800"></div>
                </div>

                <div class="flex gap-3">
                    <button class="flex-1 flex justify-center items-center py-2 bg-gray-800 border border-gray-700 rounded-lg hover:bg-gray-700 transition text-white text-sm">
                        <i class="fab fa-google mr-2 text-xs"></i> Google
                    </button>
                    <button class="flex-1 flex justify-center items-center py-2 bg-gray-800 border border-gray-700 rounded-lg hover:bg-gray-700 transition text-white text-sm">
                        <i class="fab fa-apple mr-2 text-xs"></i> Apple
                    </button>
                </div>
            </div>

            <p class="text-center text-gray-500 text-xs mt-8">
                Don't have an account? 
                <a href="{% url 'signup' %}" class="text-orange-500 font-bold hover:underline ml-1">Sign Up here</a>
            </p>
        </div>
    </div>

    <script>
        function toggleLoginPassword() {
            const passwordInput = document.getElementById('loginPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
